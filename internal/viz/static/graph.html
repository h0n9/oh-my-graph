<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>oh-my-graph</title>
<style>
  :root {
    --bg:          #ffffff;
    --fg:          #000000;
    --node-fill:   #ffffff;
    --node-stroke: #000000;
    --edge-stroke: #555555;
    --label-color: #000000;
    --type-color:  #666666;
    --edge-label:  #888888;
    --border:      #dddddd;
    --muted:       #999999;
    --link:        #000000;
    --panel-bg:    #fafafa;
    --dim:         0.15;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:          #111111;
      --fg:          #eeeeee;
      --node-fill:   #1e1e1e;
      --node-stroke: #cccccc;
      --edge-stroke: #777777;
      --label-color: #eeeeee;
      --type-color:  #aaaaaa;
      --edge-label:  #777777;
      --border:      #333333;
      --muted:       #666666;
      --link:        #eeeeee;
      --panel-bg:    #1a1a1a;
      --dim:         0.12;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    font-size: 13px;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 5;
  }

  header a {
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
  }
  header a:hover { color: var(--fg); }
  header .sep { color: var(--muted); }
  header .topic { font-weight: 600; font-size: 14px; }
  header .stats { margin-left: auto; color: var(--muted); font-size: 12px; }

  .main {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
  }

  #canvas {
    flex: 1;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }
  #canvas.dragging { cursor: grabbing; }

  /* ── node styles ── */
  .node-circle {
    fill: var(--node-fill);
    stroke: var(--node-stroke);
    stroke-width: 1.5;
    transition: opacity 0.15s;
  }
  .node-circle.blocker  { stroke-dasharray: 4 2; }
  .node-circle.question { stroke-dasharray: 2 2; }
  .node-circle.focused  { stroke-width: 3; }

  .node-label {
    fill: var(--label-color);
    font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    font-size: 11px;
    text-anchor: middle;
    pointer-events: none;
    dominant-baseline: hanging;
    transition: opacity 0.15s;
  }
  .node-type {
    fill: var(--type-color);
    font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    font-size: 9px;
    text-anchor: middle;
    pointer-events: none;
    dominant-baseline: hanging;
    transition: opacity 0.15s;
  }

  /* ── edge styles ── */
  .edge-line {
    stroke: var(--edge-stroke);
    stroke-width: 1;
    fill: none;
    transition: opacity 0.15s;
  }
  .edge-line.highlighted { stroke-width: 2; }

  .edge-label {
    fill: var(--edge-label);
    font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    font-size: 9px;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    transition: opacity 0.15s;
    opacity: 0;
  }
  .edge-label.visible { opacity: 1; }

  /* dim class applied to non-focused elements */
  .dimmed { opacity: var(--dim) !important; }

  /* ── detail panel ── */
  #detail {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 300px;
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.2s ease;
    z-index: 4;
  }
  #detail.visible { transform: translateX(0); }

  #detail .close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 4px;
  }
  #detail .close:hover { color: var(--fg); }

  #detail .d-type {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  #detail .d-summary {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 16px;
    word-break: break-word;
  }

  #detail .d-description {
    font-size: 12px;
    color: var(--fg);
    line-height: 1.6;
    margin-bottom: 16px;
    word-break: break-word;
    white-space: pre-wrap;
  }

  #detail .d-section {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    margin-top: 16px;
  }

  #detail .d-confidence {
    font-size: 12px;
    color: var(--fg);
    margin-bottom: 12px;
  }

  #detail .d-id {
    font-size: 10px;
    color: var(--muted);
    word-break: break-all;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  #detail .d-edge {
    font-size: 11px;
    color: var(--fg);
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    align-items: baseline;
    cursor: pointer;
    text-decoration: none;
  }
  #detail .d-edge:last-child { border-bottom: none; }
  #detail .d-edge:hover .enode { text-decoration: underline; }
  #detail .d-edge .etype {
    color: var(--muted);
    font-size: 10px;
    flex-shrink: 0;
  }
  #detail .d-edge .enode {
    word-break: break-word;
  }
</style>
</head>
<body>

<header>
  <a href="/">oh-my-graph</a>
  <span class="sep">/</span>
  <span class="topic" id="topicName"></span>
  <span class="stats" id="statsLabel"></span>
</header>

<div class="main">
  <svg id="canvas">
    <defs>
      <marker id="arrow" markerWidth="6" markerHeight="6"
              refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="var(--edge-stroke)"/>
      </marker>
    </defs>
    <g id="root">
      <g id="edgeLayer"></g>
      <g id="nodeLayer"></g>
    </g>
  </svg>

  <div id="detail">
    <button class="close" id="detailClose">×</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const topic  = params.get('topic') || '';
document.title = topic ? `${topic} — oh-my-graph` : 'oh-my-graph';
document.getElementById('topicName').textContent = topic;

// ── constants ────────────────────────────────────────────────────────────────
const NODE_R        = 22;
const LABEL_CHARS   = 28;
const REPULSION     = 6000;
const SPRING_K      = 0.04;
const SPRING_REST   = 160;
const DAMPING       = 0.78;
const ITERATIONS    = 1;
const MIN_ENERGY    = 0.3;
const POLL_INTERVAL_MS = 4000;

// ── state ────────────────────────────────────────────────────────────────────
let nodes = [], edges = [];
let sim = null;
let focusedNodeId  = null;
let hoveredNodeId  = null; // tracks mouse position regardless of panel state

// ── fetch & boot ─────────────────────────────────────────────────────────────
function updateStatsLabel() {
  document.getElementById('statsLabel').textContent =
    `${nodes.length} nodes · ${edges.length} edges`;
}

fetch(`/api/graph?topic=${encodeURIComponent(topic)}`)
  .then(r => r.ok ? r.json() : Promise.reject(r.statusText))
  .then(data => {
    nodes = data.nodes || [];
    edges = data.edges || [];
    updateStatsLabel();
    initSim();
    render();
    startSim();
    setInterval(refreshGraph, POLL_INTERVAL_MS);
  })
  .catch(err => {
    document.getElementById('statsLabel').textContent = 'error: ' + err;
  });

// ── incremental refresh (polling) ─────────────────────────────────────────────
function refreshGraph() {
  if (document.hidden) return;

  fetch(`/api/graph?topic=${encodeURIComponent(topic)}`)
    .then(r => r.ok ? r.json() : Promise.reject(r.statusText))
    .then(data => {
      const knownNodeIds = new Set(nodes.map(n => n.id));
      const knownEdgeIds = new Set(edges.map(e => e.id));
      const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));

      const newNodes = (data.nodes || []).filter(n => !knownNodeIds.has(n.id));
      const newEdges = (data.edges || []).filter(e => !knownEdgeIds.has(e.id));
      if (!newNodes.length && !newEdges.length) return;

      const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
      newNodes.forEach(n => {
        const neighborIds = (data.edges || [])
          .filter(e => e.from === n.id || e.to === n.id)
          .map(e => e.from === n.id ? e.to : e.from)
          .filter(id => nodeMap[id]);
        if (neighborIds.length) {
          n._x = neighborIds.reduce((sum, id) => sum + nodeMap[id]._x, 0) / neighborIds.length;
          n._y = neighborIds.reduce((sum, id) => sum + nodeMap[id]._y, 0) / neighborIds.length;
        } else {
          n._x = cx; n._y = cy;
        }
        n._vx = n._vy = 0;
        nodes.push(n);
        nodeMap[n.id] = n;
        createNodeEl(n);
      });

      newEdges.forEach(e => {
        edges.push(e);
        [e.from, e.to].forEach(id => {
          if (!adjEdges[id]) adjEdges[id] = [];
          adjEdges[id].push(e.id);
        });
        createEdgeEl(e);
      });

      updateStatsLabel();
      if (!sim) startSim();
    })
    .catch(() => { /* transient poll failure, retry on next interval */ });
}

// ── physics ───────────────────────────────────────────────────────────────────
function initSim() {
  const cx = window.innerWidth  / 2;
  const cy = window.innerHeight / 2;
  const spread = Math.max(180, Math.sqrt(nodes.length) * 80);
  nodes.forEach((n, i) => {
    const angle = (2 * Math.PI * i) / nodes.length;
    n._x = cx + spread * Math.cos(angle);
    n._y = cy + spread * Math.sin(angle);
    n._vx = n._vy = 0;
  });
}

function physicsStep() {
  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dx = b._x - a._x, dy = b._y - a._y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 0.1;
      const f = REPULSION / (dist * dist);
      const fx = (dx/dist)*f, fy = (dy/dist)*f;
      if (!a._pinned) { a._vx -= fx; a._vy -= fy; }
      if (!b._pinned) { b._vx += fx; b._vy += fy; }
    }
  }
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    const dx = b._x - a._x, dy = b._y - a._y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 0.1;
    const f = SPRING_K * (dist - SPRING_REST);
    const fx = (dx/dist)*f, fy = (dy/dist)*f;
    if (!a._pinned) { a._vx += fx; a._vy += fy; }
    if (!b._pinned) { b._vx -= fx; b._vy -= fy; }
  });
  // weak center gravity to prevent nodes drifting off-screen
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  nodes.forEach(n => {
    if (!n._pinned) {
      n._vx += (cx - n._x) * 0.005;
      n._vy += (cy - n._y) * 0.005;
    }
  });
  let totalV = 0;
  nodes.forEach(n => {
    if (n._pinned) return;
    n._vx *= DAMPING; n._vy *= DAMPING;
    n._x  += n._vx;  n._y  += n._vy;
    totalV += Math.abs(n._vx) + Math.abs(n._vy);
  });
  return nodes.length ? totalV / nodes.length : 0;
}

function startSim() {
  if (sim) cancelAnimationFrame(sim);
  function tick() {
    let avgV = 0;
    for (let i = 0; i < ITERATIONS; i++) avgV = physicsStep();
    updatePositions();
    if (avgV > MIN_ENERGY) sim = requestAnimationFrame(tick);
    else sim = null;
  }
  sim = requestAnimationFrame(tick);
}

// ── render (DOM creation, one-time) ──────────────────────────────────────────
function truncate(s) {
  return s.length > LABEL_CHARS ? s.slice(0, LABEL_CHARS - 1) + '…' : s;
}

const edgeLayer = document.getElementById('edgeLayer');
const nodeLayer = document.getElementById('nodeLayer');
const detail    = document.getElementById('detail');
const detailContent = document.getElementById('detailContent');

const edgeEls = {};
const nodeEls = {};

// adjacency for focus highlighting
const adjEdges = {}; // nodeId -> [edgeId, ...]

function createEdgeEl(e) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.classList.add('edge-line');
  line.setAttribute('marker-end', 'url(#arrow)');
  const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  label.classList.add('edge-label');
  label.textContent = e.type.replace(/_/g, ' ');
  g.appendChild(line);
  g.appendChild(label);
  edgeLayer.appendChild(g);
  edgeEls[e.id] = { g, line, label, edge: e };
}

function createNodeEl(n) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.style.cursor = 'pointer';

  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.classList.add('node-circle', n.type);
  circle.setAttribute('r', NODE_R);

  const labelEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  labelEl.classList.add('node-label');
  labelEl.textContent = truncate(n.summary);

  const typeEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  typeEl.classList.add('node-type');
  typeEl.textContent = n.type;

  g.appendChild(circle);
  g.appendChild(labelEl);
  g.appendChild(typeEl);
  nodeLayer.appendChild(g);
  nodeEls[n.id] = { g, circle, labelEl, typeEl };

  g.addEventListener('mouseenter', () => {
    hoveredNodeId = n.id;
    if (!detail.classList.contains('visible')) focusNode(n.id);
  });
  g.addEventListener('mouseleave', () => {
    hoveredNodeId = null;
    if (focusedNodeId === n.id && !detail.classList.contains('visible')) clearFocus();
  });
  g.addEventListener('click', ev => {
    ev.stopPropagation();
    openDetail(n);
  });

  // drag
  g.addEventListener('mousedown', ev => {
    if (ev.button !== 0) return;
    ev.stopPropagation();
    n._pinned = true;
    n._vx = n._vy = 0;
    if (!sim) startSim();
    const onMove = ev2 => {
      const pt = svgPoint(ev2.clientX, ev2.clientY);
      n._x = pt.x; n._y = pt.y;
      updatePositions();
    };
    const onUp = () => {
      n._vx = n._vy = 0;
      n._pinned = false;
      if (!sim) startSim();
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
}

function render() {
  edges.forEach(e => {
    [e.from, e.to].forEach(id => {
      if (!adjEdges[id]) adjEdges[id] = [];
      adjEdges[id].push(e.id);
    });
    createEdgeEl(e);
  });

  nodes.forEach(n => createNodeEl(n));
}

// ── focus / highlight ─────────────────────────────────────────────────────────
function focusNode(nodeId) {
  if (focusedNodeId === nodeId) return;
  focusedNodeId = nodeId;

  const connectedEdges = new Set(adjEdges[nodeId] || []);
  const connectedNodes = new Set([nodeId]);
  connectedEdges.forEach(eid => {
    const e = edgeEls[eid]?.edge;
    if (e) { connectedNodes.add(e.from); connectedNodes.add(e.to); }
  });

  Object.entries(nodeEls).forEach(([id, el]) => {
    const dim = !connectedNodes.has(id);
    el.circle.classList.toggle('dimmed', dim);
    el.labelEl.classList.toggle('dimmed', dim);
    el.typeEl.classList.toggle('dimmed', dim);
    el.circle.classList.toggle('focused', id === nodeId);
  });

  Object.entries(edgeEls).forEach(([id, el]) => {
    const active = connectedEdges.has(id);
    el.line.classList.toggle('dimmed', !active);
    el.label.classList.toggle('dimmed', !active);
    el.line.classList.toggle('highlighted', active);
    el.label.classList.toggle('visible', active);
  });
}

function clearFocus() {
  if (focusedNodeId === null) return;
  focusedNodeId = null;

  Object.values(nodeEls).forEach(el => {
    el.circle.classList.remove('dimmed', 'focused');
    el.labelEl.classList.remove('dimmed');
    el.typeEl.classList.remove('dimmed');
  });
  Object.values(edgeEls).forEach(el => {
    el.line.classList.remove('dimmed', 'highlighted');
    el.label.classList.remove('dimmed', 'visible');
  });
}

// ── detail panel ──────────────────────────────────────────────────────────────
function openDetail(n) {
  focusNode(n.id);

  const nodeMap = Object.fromEntries(nodes.map(x => [x.id, x]));
  const myEdges = (adjEdges[n.id] || []).map(eid => edgeEls[eid]?.edge).filter(Boolean);

  const outgoing = myEdges.filter(e => e.from === n.id);
  const incoming = myEdges.filter(e => e.to   === n.id);

  function edgeRow(e, dir) {
    const otherId = dir === 'out' ? e.to : e.from;
    const other   = nodeMap[otherId];
    const arrow   = dir === 'out' ? '→' : '←';
    const label   = other ? escHtml(other.summary) : escHtml(otherId);
    return `<div class="d-edge" data-node-id="${escHtml(otherId)}">
      <span class="etype">${arrow} ${e.type.replace(/_/g,' ')}</span>
      <span class="enode">${label}</span>
    </div>`;
  }

  let html = `
    <div class="d-type">${n.type}</div>
    <div class="d-summary">${escHtml(n.summary)}</div>
  `;

  if (n.description) {
    html += `<div class="d-description">${escHtml(n.description)}</div>`;
  }

  if (n.confidence) {
    html += `<div class="d-section">Confidence</div>
             <div class="d-confidence">${n.confidence}</div>`;
  }

  if (outgoing.length) {
    html += `<div class="d-section">Outgoing (${outgoing.length})</div>`;
    html += outgoing.map(e => edgeRow(e, 'out')).join('');
  }

  if (incoming.length) {
    html += `<div class="d-section">Incoming (${incoming.length})</div>`;
    html += incoming.map(e => edgeRow(e, 'in')).join('');
  }

  html += `<div class="d-id">${escHtml(n.id)}</div>`;

  detailContent.innerHTML = html;
  detail.classList.add('visible');

  detailContent.querySelectorAll('.d-edge[data-node-id]').forEach(row => {
    row.addEventListener('click', ev => {
      ev.stopPropagation();
      const target = nodeMap[row.dataset.nodeId];
      if (target) openDetail(target);
    });
  });
}

function closeDetail() {
  detail.classList.remove('visible');
  if (hoveredNodeId) focusNode(hoveredNodeId);
  else clearFocus();
}

document.getElementById('detailClose').addEventListener('click', closeDetail);
document.getElementById('canvas').addEventListener('click', closeDetail);

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── position update ───────────────────────────────────────────────────────────
function updatePositions() {
  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));

  edges.forEach(e => {
    const el = edgeEls[e.id];
    if (!el) return;
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    const dx = b._x - a._x, dy = b._y - a._y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const offset = NODE_R + 6;
    const x1 = a._x + (dx/dist)*NODE_R,  y1 = a._y + (dy/dist)*NODE_R;
    const x2 = b._x - (dx/dist)*offset,  y2 = b._y - (dy/dist)*offset;
    el.line.setAttribute('x1', x1); el.line.setAttribute('y1', y1);
    el.line.setAttribute('x2', x2); el.line.setAttribute('y2', y2);
    el.label.setAttribute('x', (x1+x2)/2);
    el.label.setAttribute('y', (y1+y2)/2 - 6);
  });

  nodes.forEach(n => {
    const el = nodeEls[n.id];
    if (!el) return;
    el.circle.setAttribute('cx', n._x);
    el.circle.setAttribute('cy', n._y);
    el.labelEl.setAttribute('x', n._x);
    el.labelEl.setAttribute('y', n._y + NODE_R + 4);
    el.typeEl.setAttribute('x', n._x);
    el.typeEl.setAttribute('y', n._y + NODE_R + 16);
  });
}

// ── pan & zoom ────────────────────────────────────────────────────────────────
let viewX = 0, viewY = 0, viewScale = 1;
const root = document.getElementById('root');

function applyView() {
  root.setAttribute('transform', `translate(${viewX},${viewY}) scale(${viewScale})`);
}

const canvas = document.getElementById('canvas');
let isPanning = false, panStartX, panStartY, panStartVX, panStartVY;

canvas.addEventListener('mousedown', ev => {
  if (ev.button !== 0) return;
  isPanning = true;
  panStartX = ev.clientX; panStartY = ev.clientY;
  panStartVX = viewX;     panStartVY = viewY;
  canvas.classList.add('dragging');
});

window.addEventListener('mousemove', ev => {
  if (!isPanning) return;
  viewX = panStartVX + (ev.clientX - panStartX);
  viewY = panStartVY + (ev.clientY - panStartY);
  applyView();
});

window.addEventListener('mouseup', () => {
  isPanning = false;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('wheel', ev => {
  ev.preventDefault();
  const factor = ev.deltaY < 0 ? 1.1 : 0.91;
  const rect   = canvas.getBoundingClientRect();
  const mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
  viewX = mx - factor * (mx - viewX);
  viewY = my - factor * (my - viewY);
  viewScale *= factor;
  applyView();
}, { passive: false });

function svgPoint(cx, cy) {
  return { x: (cx - viewX) / viewScale, y: (cy - viewY) / viewScale };
}
</script>
</body>
</html>
